networks:
  finpay_internal:
    driver: bridge

services:
  mongo:
    image: mongo:7.0
    container_name: finpay-mongo
    ports:
      - "27017:27017"
    networks:
      - finpay_internal
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: finpay-redis
    ports:
      - "6380:6379"
    networks:
      - finpay_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: .
      dockerfile: packages/auth-service/Dockerfile
    container_name: finpay-auth
    networks:
      - finpay_internal
    env_file: .env
    environment:
      - MONGO_URI=mongodb://mongo:27017/finpay
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  wallet-service:
    build:
      context: .
      dockerfile: packages/wallet-service/Dockerfile
    container_name: finpay-wallet
    networks:
      - finpay_internal
    env_file: .env
    environment:
      - MONGO_URI=mongodb://mongo:27017/finpay
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  transaction-service:
    build:
      context: .
      dockerfile: packages/transaction-service/Dockerfile
    container_name: finpay-transaction
    networks:
      - finpay_internal
    env_file: .env
    environment:
      - MONGO_URI=mongodb://mongo:27017/finpay
      - WALLET_SERVICE_URL=http://wallet-service:3002
    depends_on:
      mongo:
        condition: service_healthy
      wallet-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: .
      dockerfile: packages/api-gateway/Dockerfile
    container_name: finpay-gateway
    networks:
      - finpay_internal
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - AUTH_SERVICE_URL=http://auth-service:3001
      - WALLET_SERVICE_URL=http://wallet-service:3002
      - TRANSACTION_SERVICE_URL=http://transaction-service:3003
      - ANALYTICS_SERVICE_URL=http://analytics-service:3005
      - PAYMENT_LINK_SERVICE_URL=http://payment-link-service:3006
    depends_on:
      auth-service:
        condition: service_healthy
      wallet-service:
        condition: service_healthy
      transaction-service:
        condition: service_healthy
      analytics-service:
        condition: service_healthy

  payment-worker:
    build:
      context: .
      dockerfile: packages/payment-worker/Dockerfile
    container_name: finpay-worker
    networks:
      - finpay_internal
    env_file: .env
    environment:
      - MONGO_URI=mongodb://mongo:27017/finpay
      - WALLET_SERVICE_URL=http://wallet-service:3002
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      wallet-service:
        condition: service_healthy

  bull-board:
    build:
      context: .
      dockerfile: packages/bull-board/Dockerfile
    container_name: finpay-bull-board
    networks:
      - finpay_internal
    ports:
      - "3080:3010"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3010/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  notification-service:
    build:
      context: .
      dockerfile: packages/notification-service/Dockerfile
    container_name: finpay-notification
    networks:
      - finpay_internal
    env_file: .env
    environment:
      - MONGO_URI=mongodb://mongo:27017/finpay
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  analytics-service:
    build:
      context: .
      dockerfile: packages/analytics-service/Dockerfile
    container_name: finpay-analytics
    networks:
      - finpay_internal
    env_file: .env
    environment:
      - MONGO_URI=mongodb://mongo:27017/finpay
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3005/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    container_name: finpay-frontend
    networks:
      - finpay_internal
    ports:
      - "5173:5173"
    volumes:
      - ./packages/frontend:/app/packages/frontend
      - /app/packages/frontend/node_modules
    depends_on:
      - api-gateway

  payment-link-service:
    build:
      context: .
      dockerfile: packages/payment-link-service/Dockerfile
    container_name: finpay-payment-link-service
    networks:
      - finpay_internal
    ports:
      - "3086:3006"
    environment:
      - PORT=3006
      - MONGO_URI=mongodb://mongo:27017/finpay
      - REDIS_URL=redis://redis:6379
      - API_GATEWAY_URL=http://api-gateway:3000/api
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mongo_data:
